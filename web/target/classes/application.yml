server:
  address: 0.0.0.0
  port: 8080
  servlet:
    context-path:
    # cookie 30 天过期
    session:
      cookie:
        max-age: 2592000

spring:
  application:
    name: springboot3.4.x-init
  # 默认 dev 环境
  profiles:
    active: dev

  # H2内存数据库配置（开发测试用）
  datasource:
    driver-class-name: org.h2.Driver
    url: jdbc:h2:mem:meeting_room_db;DB_CLOSE_DELAY=-1;MODE=MySQL;DATABASE_TO_LOWER=TRUE;INIT=RUNSCRIPT FROM 'classpath:sql/meeting_room.sql'
    username: sa
    password: 
  h2:
    console:
      enabled: true
      path: /h2-console


  # redis 配置（开发测试阶段暂时禁用，在WebApplication中已排除）
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      database: 0
      password: ${REDIS_PASSWORD:}
      timeout: 10s
      lettuce:
        pool:
          min-idle: 0
          max-idle: 8
          max-active: 8
          max-wait: -1ms

mybatis-plus:
  configuration:
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      logic-delete-field: is_deleted
      logic-delete-value: 1
      logic-not-delete-value: 0
      id-type: auto

path:
  file-upload-path: xxx

springdoc:
  api-docs:
    path: /v3/api-docs  # 配置 OpenAPI 文档的路径
  swagger-ui:
    path: /swagger-ui.html  # 配置 Swagger UI 的路径
    enabled: true  # 启用 Swagger UI


