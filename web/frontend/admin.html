<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>管理后台 - 会议室管理系统</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: Arial, sans-serif;
            background-color: #f5f5f5;
        }
        
        .header {
            background-color: #4CAF50;
            color: white;
            padding: 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .header h1 {
            font-size: 24px;
        }
        
        .header .user-info {
            display: flex;
            align-items: center;
        }
        
        .header .user-info span {
            margin-right: 15px;
        }
        
        .header .user-info button {
            background-color: rgba(255, 255, 255, 0.2);
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 4px;
            cursor: pointer;
        }
        
        .header .user-info button:hover {
            background-color: rgba(255, 255, 255, 0.3);
        }
        
        .container {
            max-width: 1200px;
            margin: 20px auto;
            padding: 20px;
            background-color: white;
            border-radius: 8px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
        }
        
        h2 {
            margin-bottom: 20px;
            color: #333;
        }
        
        .order-list {
            margin-top: 20px;
        }
        
        table {
            width: 100%;
            border-collapse: collapse;
        }
        
        th, td {
            padding: 12px;
            text-align: left;
            border-bottom: 1px solid #ddd;
        }
        
        th {
            background-color: #f2f2f2;
            font-weight: bold;
        }
        
        tr:hover {
            background-color: #f5f5f5;
        }
        
        .status-pending {
            color: #ff9800;
        }
        
        .status-paid {
            color: #4CAF50;
        }
        
        .status-cancelled {
            color: #f44336;
        }
        
        .error-message {
            color: red;
            margin-top: 10px;
        }
        
        .success-message {
            color: green;
            margin-top: 10px;
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>会议室管理系统 - 管理后台</h1>
        <div class="user-info">
            <span id="userName"></span>
            <button id="logoutBtn">退出登录</button>
        </div>
    </div>
    
    <div class="container">
        <h2>所有工单</h2>
        <div id="errorMessage" class="error-message"></div>
        <div id="successMessage" class="success-message"></div>
        
        <div class="order-list">
            <table id="orderTable">
                <thead>
                    <tr>
                        <th>工单号</th>
                        <th>用户</th>
                        <th>会议室</th>
                        <th>开始时间</th>
                        <th>结束时间</th>
                        <th>时长(小时)</th>
                        <th>总金额</th>
                        <th>状态</th>
                        <th>创建时间</th>
                    </tr>
                </thead>
                <tbody id="orderBody">
                    <!-- 工单列表将通过JS动态生成 -->
                </tbody>
            </table>
        </div>
    </div>
    
    <script>
        // 页面加载时获取用户信息和工单列表
        window.onload = function() {
            const user = JSON.parse(localStorage.getItem('user'));
            if (!user || user.userRole !== 'admin') {
                window.location.href = 'login.html';
                return;
            }
            
            document.getElementById('userName').textContent = user.userName;
            loadAllOrders();
        };
        
        // 退出登录
        document.getElementById('logoutBtn').addEventListener('click', function() {
            localStorage.removeItem('token');
            localStorage.removeItem('user');
            window.location.href = 'login.html';
        });
        
        // 加载所有工单列表
        function loadAllOrders() {
            const token = localStorage.getItem('token');
            
            fetch('http://localhost:8080/api/workorder/admin/list', {
                headers: {
                    'Authorization': token
                }
            })
            .then(response => response.json())
            .then(data => {
                if (data.code === 200) {
                    renderOrders(data.data);
                } else {
                    document.getElementById('errorMessage').textContent = data.message || '获取工单列表失败';
                }
            })
            .catch(error => {
                document.getElementById('errorMessage').textContent = '网络错误，请稍后重试';
                console.error('加载工单错误:', error);
            });
        }
        
        // 渲染工单列表
        function renderOrders(orders) {
            const orderBody = document.getElementById('orderBody');
            orderBody.innerHTML = '';
            
            if (orders.length === 0) {
                orderBody.innerHTML = '<tr><td colspan="9" style="text-align: center;">暂无工单</td></tr>';
                return;
            }
            
            orders.forEach(order => {
                const tr = document.createElement('tr');
                
                let statusClass = '';
                switch (order.status) {
                    case 0:
                        statusClass = 'status-pending';
                        break;
                    case 1:
                        statusClass = 'status-paid';
                        break;
                    case 2:
                        statusClass = 'status-cancelled';
                        break;
                }
                
                tr.innerHTML = `
                    <td>${order.orderNo}</td>
                    <td>${order.userName}</td>
                    <td>${order.roomName}</td>
                    <td>${order.startTime}</td>
                    <td>${order.endTime}</td>
                    <td>${order.hours}</td>
                    <td>¥${order.totalAmount.toFixed(2)}</td>
                    <td class="${statusClass}">${order.statusDesc}</td>
                    <td>${order.createTime}</td>
                `;
                
                orderBody.appendChild(tr);
            });
        }
    </script>
</body>
</html>
