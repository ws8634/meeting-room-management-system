<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>管理后台 - 会议室管理系统</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: Arial, sans-serif;
            background: #f5f5f5;
        }
        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .header h1 {
            font-size: 24px;
        }
        .user-info {
            display: flex;
            align-items: center;
            gap: 15px;
        }
        .logout-btn {
            background: rgba(255,255,255,0.2);
            border: 1px solid white;
            color: white;
            padding: 8px 15px;
            border-radius: 5px;
            cursor: pointer;
        }
        .container {
            max-width: 1200px;
            margin: 20px auto;
            padding: 0 20px;
        }
        .tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }
        .tab {
            padding: 10px 20px;
            background: white;
            border: 1px solid #ddd;
            cursor: pointer;
            border-radius: 5px;
        }
        .tab.active {
            background: #667eea;
            color: white;
            border-color: #667eea;
        }
        .content {
            background: white;
            padding: 20px;
            border-radius: 5px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }
        .hidden {
            display: none;
        }
        .btn {
            padding: 8px 15px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            margin-top: 10px;
        }
        .btn-primary {
            background: #667eea;
            color: white;
        }
        .btn-danger {
            background: #e74c3c;
            color: white;
        }
        .btn-success {
            background: #27ae60;
            color: white;
        }
        .form-group {
            margin-bottom: 15px;
        }
        label {
            display: block;
            margin-bottom: 5px;
            color: #666;
        }
        input, select, textarea {
            width: 100%;
            padding: 8px;
            border: 1px solid #ddd;
            border-radius: 5px;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 10px;
        }
        th, td {
            border: 1px solid #ddd;
            padding: 10px;
            text-align: left;
        }
        th {
            background: #f5f5f5;
        }
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            justify-content: center;
            align-items: center;
        }
        .modal-content {
            background: white;
            padding: 30px;
            border-radius: 5px;
            width: 500px;
        }
        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }
        .close-btn {
            background: none;
            border: none;
            font-size: 24px;
            cursor: pointer;
        }
        .status-pending {
            color: #f39c12;
        }
        .status-paid {
            color: #27ae60;
        }
        .status-cancelled {
            color: #e74c3c;
        }
        .room-list {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 20px;
        }
        .room-card {
            border: 1px solid #ddd;
            border-radius: 5px;
            padding: 15px;
        }
        .room-card h3 {
            margin-bottom: 10px;
            color: #333;
        }
        .room-card p {
            margin-bottom: 5px;
            color: #666;
        }
        .room-card .price {
            color: #e74c3c;
            font-weight: bold;
            font-size: 18px;
        }
        .action-buttons {
            display: flex;
            gap: 10px;
            margin-top: 10px;
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>会议室管理系统 - 管理后台</h1>
        <div class="user-info">
            <span id="currentUserName"></span>
            <button class="logout-btn" onclick="logout()">退出登录</button>
        </div>
    </div>

    <div class="container">
        <div class="tabs">
            <button class="tab active" onclick="switchTab('rooms')">会议室管理</button>
            <button class="tab" onclick="switchTab('orders')">工单管理</button>
            <button class="tab" onclick="switchTab('users')">用户管理</button>
        </div>

        <div id="roomsContent" class="content">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
                <h2>会议室列表</h2>
                <button class="btn btn-primary" onclick="openRoomModal()">添加会议室</button>
            </div>
            <div id="roomList" class="room-list"></div>
        </div>

        <div id="ordersContent" class="content hidden">
            <h2>工单列表</h2>
            <table>
                <thead>
                    <tr>
                        <th>工单ID</th>
                        <th>用户</th>
                        <th>会议室</th>
                        <th>开始时间</th>
                        <th>结束时间</th>
                        <th>总价</th>
                        <th>状态</th>
                        <th>操作</th>
                    </tr>
                </thead>
                <tbody id="orderTableBody"></tbody>
            </table>
        </div>

        <div id="usersContent" class="content hidden">
            <h2>用户列表</h2>
            <table>
                <thead>
                    <tr>
                        <th>用户ID</th>
                        <th>用户名</th>
                        <th>真实姓名</th>
                        <th>手机号</th>
                        <th>角色</th>
                        <th>创建时间</th>
                    </tr>
                </thead>
                <tbody id="userTableBody"></tbody>
            </table>
        </div>
    </div>

    <div id="roomModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h3 id="roomModalTitle">添加会议室</h3>
                <button class="close-btn" onclick="closeRoomModal()">&times;</button>
            </div>
            <div class="form-group">
                <label>会议室名称</label>
                <input type="text" id="roomName">
            </div>
            <div class="form-group">
                <label>描述</label>
                <textarea id="roomDescription" rows="3"></textarea>
            </div>
            <div class="form-group">
                <label>容纳人数</label>
                <input type="number" id="roomCapacity" min="1">
            </div>
            <div class="form-group">
                <label>每小时单价</label>
                <input type="number" id="roomHourlyRate" step="0.01" min="0">
            </div>
            <div class="form-group">
                <label>是否可用</label>
                <select id="roomAvailable">
                    <option value="true">可用</option>
                    <option value="false">不可用</option>
                </select>
            </div>
            <button class="btn btn-primary" onclick="saveRoom()">保存</button>
        </div>
    </div>

    <script>
        let currentUser = null;
        let editingRoomId = null;

        function init() {
            currentUser = JSON.parse(localStorage.getItem('currentUser'));
            if (!currentUser || currentUser.role !== 'ADMIN') {
                window.location.href = '/index.html';
                return;
            }
            document.getElementById('currentUserName').textContent = currentUser.realName;
            loadRooms();
            loadOrders();
            loadUsers();
        }

        function switchTab(tab) {
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.content').forEach(c => c.classList.add('hidden'));
            
            if (tab === 'rooms') {
                document.querySelectorAll('.tab')[0].classList.add('active');
                document.getElementById('roomsContent').classList.remove('hidden');
            } else if (tab === 'orders') {
                document.querySelectorAll('.tab')[1].classList.add('active');
                document.getElementById('ordersContent').classList.remove('hidden');
            } else {
                document.querySelectorAll('.tab')[2].classList.add('active');
                document.getElementById('usersContent').classList.remove('hidden');
            }
        }

        function loadRooms() {
            fetch('/api/room')
                .then(response => response.json())
                .then(data => {
                    const roomList = document.getElementById('roomList');
                    roomList.innerHTML = '';
                    data.data.forEach(room => {
                        const roomCard = document.createElement('div');
                        roomCard.className = 'room-card';
                        roomCard.innerHTML = `
                            <h3>${room.name}</h3>
                            <p>${room.description}</p>
                            <p>容纳人数: ${room.capacity}人</p>
                            <p class="price">¥${room.hourlyRate}/小时</p>
                            <p>状态: ${room.available ? '可用' : '不可用'}</p>
                            <div class="action-buttons">
                                <button class="btn btn-primary" onclick="editRoom(${room.id})">编辑</button>
                                <button class="btn btn-danger" onclick="deleteRoom(${room.id})">删除</button>
                            </div>
                        `;
                        roomList.appendChild(roomCard);
                    });
                });
        }

        function loadOrders() {
            fetch('/api/order')
                .then(response => response.json())
                .then(data => {
                    const tbody = document.getElementById('orderTableBody');
                    tbody.innerHTML = '';
                    data.data.forEach(order => {
                        const tr = document.createElement('tr');
                        let statusClass = '';
                        let statusText = '';
                        if (order.status === 'PENDING') {
                            statusClass = 'status-pending';
                            statusText = '待支付';
                        } else if (order.status === 'PAID') {
                            statusClass = 'status-paid';
                            statusText = '已支付';
                        } else {
                            statusClass = 'status-cancelled';
                            statusText = '已取消';
                        }
                        
                        let actions = '';
                        if (order.status === 'PENDING') {
                            actions = `
                                <button class="btn btn-success" onclick="payOrder(${order.id})">支付</button>
                                <button class="btn btn-danger" onclick="cancelOrder(${order.id})">取消</button>
                            `;
                        }
                        
                        tr.innerHTML = `
                            <td>${order.id}</td>
                            <td>${order.userName}</td>
                            <td>${order.roomName}</td>
                            <td>${order.startTime}</td>
                            <td>${order.endTime}</td>
                            <td>¥${order.totalAmount}</td>
                            <td class="${statusClass}">${statusText}</td>
                            <td>${actions}</td>
                        `;
                        tbody.appendChild(tr);
                    });
                });
        }

        function loadUsers() {
            fetch('/api/user')
                .then(response => response.json())
                .then(data => {
                    const tbody = document.getElementById('userTableBody');
                    tbody.innerHTML = '';
                    data.data.forEach(user => {
                        const tr = document.createElement('tr');
                        tr.innerHTML = `
                            <td>${user.id}</td>
                            <td>${user.username}</td>
                            <td>${user.realName}</td>
                            <td>${user.phone}</td>
                            <td>${user.role === 'ADMIN' ? '管理员' : '普通用户'}</td>
                            <td>${user.createTime}</td>
                        `;
                        tbody.appendChild(tr);
                    });
                });
        }

        function openRoomModal(room = null) {
            editingRoomId = room ? room.id : null;
            document.getElementById('roomModalTitle').textContent = room ? '编辑会议室' : '添加会议室';
            document.getElementById('roomName').value = room ? room.name : '';
            document.getElementById('roomDescription').value = room ? room.description : '';
            document.getElementById('roomCapacity').value = room ? room.capacity : '';
            document.getElementById('roomHourlyRate').value = room ? room.hourlyRate : '';
            document.getElementById('roomAvailable').value = room ? room.available : 'true';
            document.getElementById('roomModal').style.display = 'flex';
        }

        function closeRoomModal() {
            document.getElementById('roomModal').style.display = 'none';
        }

        function editRoom(roomId) {
            fetch(`/api/room/${roomId}`)
                .then(response => response.json())
                .then(data => {
                    openRoomModal(data.data);
                });
        }

        function saveRoom() {
            const room = {
                name: document.getElementById('roomName').value,
                description: document.getElementById('roomDescription').value,
                capacity: parseInt(document.getElementById('roomCapacity').value),
                hourlyRate: parseFloat(document.getElementById('roomHourlyRate').value),
                available: document.getElementById('roomAvailable').value === 'true'
            };
            
            const method = editingRoomId ? 'PUT' : 'POST';
            const url = editingRoomId ? `/api/room/${editingRoomId}` : '/api/room';
            
            fetch(url, {
                method: method,
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify(room)
            })
            .then(response => response.json())
            .then(data => {
                if (data.success) {
                    alert('保存成功！');
                    closeRoomModal();
                    loadRooms();
                } else {
                    alert(data.message);
                }
            });
        }

        function deleteRoom(roomId) {
            if (confirm('确定要删除这个会议室吗？')) {
                fetch(`/api/room/${roomId}`, {
                    method: 'DELETE'
                })
                .then(response => response.json())
                .then(data => {
                    if (data.success) {
                        alert('删除成功！');
                        loadRooms();
                    } else {
                        alert(data.message);
                    }
                });
            }
        }

        function payOrder(orderId) {
            fetch(`/api/order/${orderId}/pay`, {
                method: 'POST'
            })
            .then(response => response.json())
            .then(data => {
                if (data.success) {
                    alert('支付成功！');
                    loadOrders();
                } else {
                    alert(data.message);
                }
            });
        }

        function cancelOrder(orderId) {
            if (confirm('确定要取消这个工单吗？')) {
                fetch(`/api/order/${orderId}/cancel`, {
                    method: 'POST'
                })
                .then(response => response.json())
                .then(data => {
                    if (data.success) {
                        alert('工单已取消！');
                        loadOrders();
                    } else {
                        alert(data.message);
                    }
                });
            }
        }

        function logout() {
            localStorage.removeItem('currentUser');
            window.location.href = '/index.html';
        }

        init();
    </script>
</body>
</html>
